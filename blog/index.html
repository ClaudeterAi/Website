function drawCover(canvas, colors) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const [c1,c2,c3] = colors;
  ctx.fillStyle = c1; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = c2; ctx.globalAlpha = 0.07; ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.globalAlpha=1;
  const g=ctx.createRadialGradient(W*.3,H*.35,0,W*.3,H*.35,W*.55);
  g.addColorStop(0,c2+'44');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.6;ctx.strokeStyle=c2;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H*.72);ctx.lineTo(W*.45,H*.72);ctx.stroke();
  ctx.globalAlpha=0.4;ctx.fillStyle=c2;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(W*.05+i*W*.08,H*.65,2.5,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.blog-card').forEach(c=>{
    if(cat==='all'||c.dataset.cat===cat) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
}

const grid = document.getElementById('grid');
posts.forEach(p => {
  const a = document.createElement('a');
  a.className = 'blog-card'; a.href = `/blog/${p.slug}/`; a.dataset.cat = p.cat;

});
