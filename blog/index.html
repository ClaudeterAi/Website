<script>
const posts = [
  {slug:"ai-voice-agents-insurance-follow-up",tag:"Voice AI · RCM",title:"How AI Voice Agents Are Replacing Insurance Follow-Up Calls in 2026",excerpt:"Manual claims follow-up is costing RCM teams thousands of hours annually. Here's how AI voice agents are changing the economics of healthcare collections.",date:"Mar 5, 2026",read:"8 min read",colors:["#001a10","#00ffcc","#00cfff"]},
  {slug:"prior-auth-automation-denial-rates",tag:"Healthcare AI · RCM",title:"Prior Authorization Automation: How We Cut Denial Rates by 34%",excerpt:"A deep dive into how automating prior auth submissions through Availity and payer portals can dramatically reduce denials and administrative burden.",date:"Mar 3, 2026",read:"10 min read",colors:["#0a0010","#b44fff","#00ffcc"]},
  {slug:"real-cost-manual-claims-follow-up",tag:"RCM · Operations",title:"The Real Cost of Manual Claims Follow-Up (And How to Fix It)",excerpt:"Beyond the obvious labor costs, manual claims follow-up creates invisible revenue leaks that most billing managers never fully account for.",date:"Feb 28, 2026",read:"7 min read",colors:["#100a00","#ff9f00","#00ffcc"]},
  {slug:"ai-agents-payer-ivr-navigation",tag:"Voice AI · Payers",title:"Ambetter, UHC, Aetna — How AI Agents Navigate Payer IVR Systems",excerpt:"Every major payer has a different IVR tree. Here's how we train voice agents to handle hold times, prompts, and authentication flows for the top US payers.",date:"Feb 24, 2026",read:"9 min read",colors:["#000d1a","#00cfff","#00ffcc"]},
  {slug:"dha-eclaims-tpa-automation-uae",tag:"UAE · Healthcare",title:"Automating DHA eClaims and TPA Portals in the UAE — A Complete Guide",excerpt:"A practical guide to automating insurance submissions across the UAE's major TPA portals: NextCare, NAS, Neuron, AlMadallah, and DHA eClaims.",date:"Feb 20, 2026",read:"12 min read",colors:["#001510","#00ff88","#00ffcc"]},
  {slug:"nextcare-nas-neuron-automation",tag:"UAE · RPA",title:"NextCare, NAS, Neuron, AlMadallah — One Automation to Rule Them All",excerpt:"UAE healthcare providers deal with 5+ TPA portals daily. We built a unified RPA layer that handles all of them — here's how it works.",date:"Feb 17, 2026",read:"11 min read",colors:["#0d0010","#ff44cc","#00ffcc"]},
  {slug:"what-ai-agencies-wont-tell-you",tag:"AI Agency · Opinion",title:"What Most AI Agencies Won't Tell You About Building Voice Agents",excerpt:"After building 50+ AI systems, here are the uncomfortable truths about voice agent development that most vendors gloss over in sales calls.",date:"Feb 13, 2026",read:"6 min read",colors:["#100000","#ff4444","#ff9f00"]},
  {slug:"why-we-ship-in-6-weeks",tag:"Process · Engineering",title:"Why We Ship AI in 6 Weeks While Others Take 6 Months",excerpt:"The difference isn't working harder. It's a fundamentally different approach to scoping, building, and validating AI systems from day one.",date:"Feb 10, 2026",read:"8 min read",colors:["#001020","#0088ff","#00ffcc"]},

function drawCover(canvas, colors, title) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = colors[0];
  ctx.fillRect(0, 0, W, H);
  // Grid lines
  ctx.strokeStyle = colors[1];
  ctx.globalAlpha = 0.08;
  ctx.lineWidth = 1;
  for(let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  // Glow circle
  ctx.globalAlpha = 1;
  const grd = ctx.createRadialGradient(W*.3, H*.4, 0, W*.3, H*.4, W*.6);
  grd.addColorStop(0, colors[1]+'33');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);
  // Accent lines
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = colors[1];
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H*.7); ctx.lineTo(W*.4, H*.7); ctx.stroke();
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = colors[2];
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*.1, H*.8); ctx.lineTo(W*.6, H*.8); ctx.stroke();
  // Dots
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = colors[1];
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.arc(W*.05+i*W*.08, H*.65, 2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

const grid = document.getElementById('grid');
posts.forEach(p => {
  const a = document.createElement('a');
  a.className = 'blog-card';
  a.href = `/blog/${p.slug}/`;
  a.innerHTML = `
    <div class="blog-img"><canvas width="640" height="360"></canvas></div>
    <div class="blog-body">
      <div class="blog-tag">${p.tag}</div>
      <div class="blog-title">${p.title}</div>
      <div class="blog-excerpt">${p.excerpt}</div>
      <div class="blog-meta">
        <span class="blog-date">${p.date}</span>
        <span class="blog-read">${p.read}</span>
      </div>
    </div>`;
  grid.appendChild(a);
  drawCover(a.querySelector('canvas'), p.colors, p.title);
});
